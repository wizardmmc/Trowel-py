[project]
name = "trowel-py"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.105.2",
    "fastapi>=0.136.3",
    "fsrs>=6.3.1",
    "openai>=2.41.0",
    "pydantic>=2.13.4",
    # "python-dotenv>=1.2.2",
    "uvicorn>=0.48.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# integration tests spawn a real `claude -p`; they deadlock inside an
# interactive claude session (#46416). Deselect by default; run explicitly with
# `CC_INTEGRATION=1 .venv/bin/python -m pytest -m integration tests/cc_host/test_integration.py`.
addopts = "-m 'not integration'"
markers = [
    "integration: tests that spawn a real `claude -p` subprocess (skip in nested interactive sessions; #46416)",
]
