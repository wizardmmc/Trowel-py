# slice-038 多相关 ground-truth 检索评测基准 (C-8: 版本化稳定基准)
#
# 每条 query 的 relevant 是 wiki/pages 里真实存在的笔记文件名 (stem)，2-5 条，
# 保证召回率能独立于准确率被测出来 (S1 单相关 query 让两者数学塌缩)。
# `category` 标注该 query 设计来压测的失败模式，供 baseline 分析用 (load_queries 忽略)。
# dictionary 每次重生成后都用同一套基准重跑，趋势才可比。

